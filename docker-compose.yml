services:
  postgres:
    image: postgres:16-alpine
    container_name: drivee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drivee_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-drivee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drivee}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drivee} -d ${POSTGRES_DB:-drivee_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - drivee_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drivee-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-drivee}:${POSTGRES_PASSWORD:-drivee}@postgres:5432/${POSTGRES_DB:-drivee_analytics}
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
    command: >
      sh -c "python scripts/wait_for_postgres.py
      && alembic upgrade head
      && python scripts/seed_demo_data.py
      && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    networks:
      - drivee_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drivee-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_MOCK: ${NEXT_PUBLIC_API_MOCK:-false}
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- -H 0.0.0.0 -p 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    networks:
      - drivee_net

  pgadmin:
    image: dpage/pgadmin4:8.12
    container_name: drivee-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@drivee.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - drivee_net

networks:
  drivee_net:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next_cache:
  pgadmin_data:
