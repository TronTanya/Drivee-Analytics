services:
  postgres:
    image: postgres:16-alpine
    container_name: drivee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drivee_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-drivee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drivee}
    # Проброс на хост: 5432/5433 часто заняты локальным Postgres — задайте POSTGRES_PORT в .env при конфликте.
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drivee} -d ${POSTGRES_DB:-drivee_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - drivee_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drivee-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-drivee}:${POSTGRES_PASSWORD:-drivee}@postgres:5432/${POSTGRES_DB:-drivee_analytics}
      CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}"
      PYTHONPATH: /app
      CSV_MAX_UPLOAD_MB: ${CSV_MAX_UPLOAD_MB:-300}
      SKIP_DEMO_TRAIN_SEED: ${SKIP_DEMO_TRAIN_SEED:-true}
      EXTERNAL_TRAIN_CSV_PATH: ${EXTERNAL_TRAIN_CSV_PATH:-/data/train.csv}
      EXTERNAL_TRAIN_CSV_LIMIT: ${EXTERNAL_TRAIN_CSV_LIMIT:--1}
    command: >
      sh -c "python scripts/wait_for_postgres.py
      && alembic upgrade head
      && python scripts/seed_demo_data.py
      && python scripts/import_train_csv.py --path ${EXTERNAL_TRAIN_CSV_PATH:-/data/train.csv} --replace --limit ${EXTERNAL_TRAIN_CSV_LIMIT:--1}
      && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    # Пока не слушает 8000 (миграции/импорт train), фронт не должен проксировать — иначе ECONNREFUSED → 500 в браузере.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read(64)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 600s
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      # Путь к train CSV на хосте: по умолчанию мини-набор в репозитории (портативно для CI/хакатона).
      # Для полного датасета: HOST_TRAIN_CSV_PATH=/abs/path/train.csv в .env
      - ${HOST_TRAIN_CSV_PATH:-./backend/demo_data/train_minimal.csv}:/data/train.csv:ro
    networks:
      - drivee_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drivee-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # По умолчанию same-origin: запросы идут на /api/* → Next rewrites → backend (CORS в браузере не нужен).
      # Для прямого вызова :8000 с хоста задайте NEXT_PUBLIC_API_URL=http://localhost:8000 и корректный BACKEND_CORS_ORIGINS.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-same-origin}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://backend:8000}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000}
      NEXT_PUBLIC_API_MOCK: ${NEXT_PUBLIC_API_MOCK:-false}
      # Для Playwright / офлайн: NEXT_PUBLIC_DEMO_FORCE_ANALYTICS_MOCK=true (мгновенный mockRunAnalytics).
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
      NEXT_PUBLIC_DEMO_FORCE_ANALYTICS_MOCK: ${NEXT_PUBLIC_DEMO_FORCE_ANALYTICS_MOCK:-false}
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- -H 0.0.0.0 -p 3000
    # 3000 на хосте часто занят локальным `npm run dev` — по умолчанию 3001.
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    networks:
      - drivee_net

  pgadmin:
    image: dpage/pgadmin4:8.12
    container_name: drivee-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@drivee.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - drivee_net

networks:
  drivee_net:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next_cache:
  pgadmin_data: