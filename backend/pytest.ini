[pytest]
pythonpath = .
testpaths = tests
markers =
    smoke: HTTP wiring / contract (без полной БД-логики)
    integration: сквозные цепочки сервисов (могут патчить settings)
    unit: изолированные модули
    e2e: полный путь против поднятого стенда (по умолчанию не запускать в CI без окружения)
